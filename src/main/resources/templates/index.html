<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pomguard</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; color: #222; }
        h1 { margin-bottom: 0.25rem; }
        .subtitle { color: #666; margin-top: 0; }
        form { margin-top: 2rem; padding: 1.5rem; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input[type=file] { display: block; margin-bottom: 1rem; }
        button { padding: 0.5rem 1rem; background: #2d6cdf; color: white; border: 0; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1f57bf; }
        footer { margin-top: 3rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>Pomguard</h1>
    <p class="subtitle">Eco-Code Dependency Auditor</p>
    <form method="post" action="/audit" enctype="multipart/form-data">
        <label for="file">Upload your <code>pom.xml</code>:</label>
        <input type="file" id="file" name="file" accept=".xml" required>
        <button type="submit">Audit</button>
    </form>
    <footer>
        Checks each dependency against the Maven Central Repository.
    </footer>
</body>
</html>
