<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Audit Results - Pomguard</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 960px; margin: 3rem auto; padding: 0 1rem; color: #222; }
        h1 { margin-bottom: 0.25rem; }
        .meta { color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; }
        .status { font-weight: bold; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; display: inline-block; }
        .status.GREEN { background: #d4edda; color: #155724; }
        .status.YELLOW { background: #fff3cd; color: #856404; }
        .status.RED { background: #f8d7da; color: #721c24; }
        .status.UNKNOWN { background: #e2e3e5; color: #383d41; }
        a { color: #2d6cdf; }
    </style>
</head>
<body>
    <h1>Audit Results</h1>
    <p class="meta">
        <span th:text="${filename}">pom.xml</span> -
        <span th:text="${total}">0</span> dependencies scanned.
        <a href="/">Upload another</a>
    </p>
    <table>
        <thead>
            <tr>
                <th>Status</th>
                <th>Group</th>
                <th>Artifact</th>
                <th>Current</th>
                <th>Latest</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${results}">
                <td><span class="status" th:classappend="${r.status()}" th:text="${r.status()}">STATUS</span></td>
                <td th:text="${r.groupId()}">group</td>
                <td th:text="${r.artifactId()}">artifact</td>
                <td th:text="${r.currentVersion()}">current</td>
                <td th:text="${r.latestVersion()}">latest</td>
                <td th:text="${r.note()}">note</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
